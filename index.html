<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>我的遊戲</title>
</head>

<body>

<h1>猜數字遊戲</h1>

<input id="num">
<button onclick="check()">猜</button>

<p id="result"></p>

<script>
let answer = Math.floor(Math.random()*10)+1;

function check(){
  let user = document.getElementById("num").value;

  if(user == answer){
    document.getElementById("result").innerHTML = "答對了";
  }else{
    document.getElementById("result").innerHTML = "再猜一次";
  }
}
</script>

</body>
</html>
